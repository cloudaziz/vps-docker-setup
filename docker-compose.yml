services:
  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./nginx/cache:/var/cache/nginx
    networks:
      - cloudaziz
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mariadb:
    image: mariadb:11.8
    container_name: mariadb
    restart: unless-stopped

    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - cloudaziz

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - cloudaziz

  wordpress:
    build:
      context: .
      dockerfile: docker/wordpress/Dockerfile
    image: cloudaziz-wordpress
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_INSTANCE: "WordPress #1"
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/wordpress/php.ini:/usr/local/etc/php/conf.d/php.ini:ro
      - ./docker/wordpress/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./docker/wordpress/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - cloudaziz
  wordpress-2:
    image: cloudaziz-wordpress
    container_name: wordpress-2
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_INSTANCE: "WordPress #2"
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/wordpress/php.ini:/usr/local/etc/php/conf.d/php.ini:ro
      - ./docker/wordpress/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./docker/wordpress/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - cloudaziz

networks:
  cloudaziz:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  wordpress_data:
