server {

    listen 80;

    server_name cloudaziz.com www.cloudaziz.com;

    ##################################################
    # Let's Encrypt Challenge
    ##################################################

    location /.well-known/acme-challenge/ {

        root /var/www/certbot;
    }

    ##################################################
    # Redirect Everything Else
    ##################################################

    location / {

        return 301 https://$host$request_uri;
    }

}
