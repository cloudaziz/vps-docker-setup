upstream wordpress_backend {

    least_conn;

    server wordpress:9000;
    server wordpress-2:9000;

    keepalive 16;
}

server {

    listen 443 ssl http2;

    server_name cloudaziz.com www.cloudaziz.com;

    root /var/www/html;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/cloudaziz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudaziz.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {

        try_files $uri $uri/ /index.php?$args;

    }

    location ~ \.php$ {

        include fastcgi_params;

        fastcgi_pass wordpress_backend;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_index index.php;

    }

    location ~ /\. {

        deny all;

    }

}
