upstream wordpress_backend {
    least_conn;

    server wordpress:9000 max_fails=3 fail_timeout=30s;
    server wordpress-2:9000 max_fails=3 fail_timeout=30s;

    keepalive 16;
  }

server {
    listen 443 ssl;
    http2 on;

    server_name cloudaziz.com www.cloudaziz.com;

    root /var/www/html;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/cloudaziz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudaziz.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 128M;

    location / {
      try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
      include fastcgi_params;
      fastcgi_pass wordpress_backend;
      fastcgi_keep_conn on;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      add_header X-Upstream-Server $upstream_addr always;

      set $skip_cache 0;
      if ($request_method = POST) {
        set $skip_cache 1;
      }
      if ($query_string != "") {
        set $skip_cache 1;
      }
      if ($request_uri ~* "^/wp-admin/|^/wp-login.php|^/cart|^/checkout|^/my-account") {
        set $skip_cache 1;
      }
      if ($http_cookie ~* "comment_author|wordpress_logged_in|woocommerce_items_in_cart|wp_woocommerce_session") {
        set $skip_cache 1;
      }

      fastcgi_cache WORDPRESS;
      fastcgi_cache_valid 200 10m;
      fastcgi_cache_valid 301 302 1h;
      fastcgi_cache_valid 404 5m;

      fastcgi_cache_bypass $skip_cache;
      fastcgi_no_cache $skip_cache;

      add_header X-FastCGI-Cache $upstream_cache_status always;
    }
    location ^~ /phpmyadmin/ {
      proxy_pass http://phpmyadmin/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    } 

    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|woff2?)$ {
	try_files $uri =404;
        expires 30d;
        access_log off;
    }
}
